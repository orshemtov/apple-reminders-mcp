name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release binary
        run: swift build -c release --product apple-reminders-mcp

      - name: Prepare release archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          ASSET_DIR="dist"
          ARCHIVE_NAME="apple-reminders-mcp-${VERSION}-macos-arm64.tar.gz"

          mkdir -p "$ASSET_DIR"
          cp ".build/release/apple-reminders-mcp" "$ASSET_DIR/apple-reminders-mcp"
          tar -C "$ASSET_DIR" -czf "$ASSET_DIR/$ARCHIVE_NAME" apple-reminders-mcp
          shasum -a 256 "$ASSET_DIR/$ARCHIVE_NAME" > "$ASSET_DIR/$ARCHIVE_NAME.sha256"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/*.sha256
