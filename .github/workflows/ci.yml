name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift 6.2
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2'

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Format check
        run: swift format lint --strict --recursive Sources Tests Package.swift

      - name: Build
        run: swift build

      - name: Test
        run: swift test
